version: "3.8"

services:
  nginx:
    build: ./nginx
    image: nginx
    container_name: "nginx_cont"
    ports:
      - "80:80"
    restart: always
    depends_on:
      - django_app
    networks:
      - notes-app-nw

  django_app:
    build:
      context: .
    image: django_app
    container_name: "django_cont"
    ports:
      - "8000:8000"
    command: sh -c "python manage.py migrate --noinput && gunicorn notesapp.wsgi --bind 0.0.0.0:8000"
    env_file:
      - ".env"
    depends_on:
      - db
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/admin || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - notes-app-nw

  db:
    image: mysql
    container_name: "db_cont"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=test_db
    volumes:
      - ./data/mysql/db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - notes-app-nw

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports: 
     - "3100:3100"
    volumes:
     -  ${PWD}:/mnt/config
     -  ${PWD}/data/loki:/var/lib/loki
    command: -config.file=/mnt/config/loki-config.yaml
    networks:
     - notes-app-nw 
  
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - loki
    networks:
      - notes-app-nw  
  
  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    volumes:
      - ${PWD}:/mnt/config
    command: -config.file=/mnt/config/promtail-config.yaml
    ports:
      - "6000:6000"
    depends_on:
      - loki
    networks:
      - notes-app-nw    

networks:
  notes-app-nw:

volumes:
  mysql_data:
  loki_data:

 
