auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /var/lib/loki
  storage:
    filesystem:
      chunks_directory: /var/lib/loki/chunks
      rules_directory: /var/lib/loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true
  retention_period: 168h                  # Keep logs for 7 days
  ingestion_rate_mb: 10                   # Max 10 MB/s ingestion per tenant
  ingestion_burst_size_mb: 20             # Allow burst up to 20 MB
  per_stream_rate_limit: 5MB              # Per-stream rate limit
  max_entries_limit_per_query: 5000       # Prevent huge query results

compactor:
  working_directory: /var/lib/loki/compactor
  delete_request_store: filesystem         # Required when retention is enabled
  retention_enabled: true                  # Auto-delete logs older than retention_period
  compaction_interval: 10m
  retention_delete_delay: 2h

ruler:
  alertmanager_url: http://localhost:9093

analytics:
  reporting_enabled: false
