global:
  scrape_interval: 15s            # How often to scrape targets
  evaluation_interval: 15s        # How often to evaluate alerting rules
  scrape_timeout: 10s             # Timeout for each scrape request

scrape_configs:
  # Prometheus monitors itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  # Host-level metrics (CPU, RAM, disk, network)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node_exporter:9100"]

  # Container-level metrics (per-container CPU, memory, I/O)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "container_(cpu|memory|network|fs)_.*"
        action: keep                # Only keep relevant container metrics (reduces storage)
